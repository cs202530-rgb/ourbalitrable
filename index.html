
<!DOCTYPE html>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet.js CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
            }
            main {
                max-width: 100% !important;
                padding: 0 !important;
            }
            .print-break {
                page-break-inside: avoid;
            }
        }
        /* Leaflet 마커 핀 커스텀 스타일 */
        .custom-pin {
            background-color: #0d9488;
            color: white;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 11px;
            border: 2px solid white;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transform: translate(-50%, -50%);

    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-16 lg:pb-8 min-h-screen">

            <div>
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🌴</span>
                    <h1 class="text-xl font-black text-teal-800 tracking-tight">발리 여행 일정 관리기</h1>
                </div>
                <div class="flex flex-wrap items-center gap-2 mt-1.5 text-xs text-slate-500">
                    <span class="font-semibold text-slate-600 bg-slate-100 px-2 py-0.5 rounded">2026.07.25 - 08.03 (7박 9일)</span>
                    <span class="text-slate-300">|</span>
                    <span class="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded">브라우저 자동 저장 중</span>

    <!-- Main Container -->

                    <span class="text-xs text-slate-400 no-print">일정을 자유롭게 관리해 보세요</span>

                <div id="schedule-container" class="space-y-6">

                <button id="add-schedule-btn" class="w-full py-4 border-2 border-dashed border-teal-300 text-teal-600 font-bold rounded-2xl hover:bg-teal-50 hover:border-teal-400 transition-all flex items-center justify-center gap-2 shadow-sm no-print">

                    <div class="flex justify-between items-baseline mb-2">

                    <button onclick="zoomToSpot('seminyak')" class="flex items-center gap-1 bg-slate-100 hover:bg-teal-50 hover:text-teal-700 px-2.5 py-1.5 rounded-lg transition-colors"><span class="w-2.5 h-2.5 rounded-full bg-teal-600 inline-block"></span> 스미냑 숙소/비치</button>
                    <button onclick="zoomToSpot('kuta')" class="flex items-center gap-1 bg-slate-100 hover:bg-teal-50 hover:text-teal-700 px-2.5 py-1.5 rounded-lg transition-colors"><span class="w-2.5 h-2.5 rounded-full bg-teal-600 inline-block"></span> 꾸따 워터봄</button>
                    <button onclick="zoomToSpot('ubud')" class="flex items-center gap-1 bg-slate-100 hover:bg-teal-50 hover:text-teal-700 px-2.5 py-1.5 rounded-lg transition-colors"><span class="w-2.5 h-2.5 rounded-full bg-teal-600 inline-block"></span> 우붓 (몽키포레스트/스파)</button>

    </main>

    <!-- Leaflet.js JavaScript for Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // --- Default Seeding Data (PDF 기반) ---
        const defaultSchedules = [
            { id: "s1", date: '2026-07-25', time: '08:00', content: '인천공항 출발 ✈️', type: 'flight' },
            { id: "s2", date: '2026-07-25', time: '10:50', content: '홍콩 도착 및 환승 대기', type: 'flight' },

            { id: "s4", date: '2026-07-25', time: '17:40', content: '발리 응우라라이 공항 도착(덴파사) 🌴', type: 'flight' },
            { id: "s5", date: '2026-07-25', time: '19:00', content: '공항 픽업 차량 미팅', type: 'transport' },
            { id: "s6", date: '2026-07-25', time: '20:00', content: '스미냑 숙소 이동 (약 50분 소요)', type: 'transport' },
            { id: "s7", date: '2026-07-25', time: '', content: '숙소 근처 간단한 저녁식사 (장소 확인)', type: 'food' },
            { id: "s8", date: '2026-07-26', time: '', content: '아침식사 (장소 확인)', type: 'food' },
            { id: "s9", date: '2026-07-26', time: '', content: '꾸따/더블식스 비치에서 서핑 입문 강습 🏄‍♂️', type: 'activity' },
            { id: "s10", date: '2026-07-26', time: '', content: '점심 식사', type: 'food' },
            { id: "s11", date: '2026-07-26', time: '', content: '스미냑 스파 마사지 받으며 휴식 💆‍♀️', type: 'activity' },
            { id: "s12", date: '2026-07-26', time: '', content: '스미냑 스퀘어 쇼핑', type: 'activity' },
            { id: "s13", date: '2026-07-26', time: '', content: '저녁 식사', type: 'food' },
            { id: "s14", date: '2026-07-26', time: '', content: '포테이토 헤드 비치클럽 공연 방문 🍹', type: 'activity' },
            { id: "s15", date: '2026-07-27', time: '', content: '워터봄 발리 워터파크 종일 즐기기 🌊', type: 'activity' },
            { id: "s16", date: '2026-07-28', time: '10:00', content: '전용 차량 트랜스퍼 호텔 픽업', type: 'transport' },
            { id: "s17", date: '2026-07-28', time: '', content: '10시간 자유 차량 투어 (스미냑 -> 우붓으로 이동)', type: 'activity' },
            { id: "s18", date: '2026-07-29', time: '', content: '누사테라피 스파 방문 (1시간 240k / 90분 340k)', type: 'activity' },
            { id: "s19", date: '2026-07-30', time: '03:00', content: '바투르산 일출 지프 투어 출발 🌋', type: 'activity' },
            { id: "s20", date: '2026-07-31', time: '16:15', content: '발리 출발 ✈️', type: 'flight' },
            { id: "s21", date: '2026-07-31', time: '21:25', content: '홍콩 도착', type: 'flight' },
            { id: "s22", date: '2026-08-01', time: '', content: '홍콩 자유 일정 🇭🇰', type: 'activity' },
            { id: "s23", date: '2026-08-02', time: '19:45', content: '홍콩 -> 인천 국제선 출발 ✈️', type: 'flight' },
            { id: "s24", date: '2026-08-03', time: '00:25', content: '한국 인천공항 도착 및 귀가 🇰🇷', type: 'flight' }
        ];

        const defaultChecklists = [
            { id: "c1", content: '여권 실물 (만료일 최소 6개월 이상 필수!)', isDone: false },
            { id: "c2", content: '항공권 E-Ticket 및 바우처 준비', isDone: false },
            { id: "c3", content: '숙소 예약 정보 및 바우처 모바일 저장', isDone: false },
            { id: "c4", content: '해외 결제 가능 카드 & 트래블월렛 환전', isDone: false },
            { id: "c5", content: '수영복, 비치타올 및 아쿠아슈즈 챙기기', isDone: false },
            { id: "c6", content: '자외선 차단 선크림 및 선글라스', isDone: false },
            { id: "c7", content: '비상 상비약 (지사제, 소화제, 모기약)', isDone: false },
            { id: "c8", content: '스마트폰 유심(eSIM) 사전 구매', isDone: false },
            { id: "c9", content: '인도네시아 입국용 e-VOA 사전 신청 완료', isDone: false },
            { id: "c10", content: '전자세관신고서(ECD) 작성해두기', isDone: false }
        ];

        // --- App State ---
        let schedules = [];
        let checklists = [];
        let currentSelectedType = 'activity';
        let currentTab = 'schedule'; // 'schedule' or 'checklist' (mobile tab toggle)
        let map; // Leaflet map object
        let markersGroup = {}; // To reference markers individually

        // --- LocalStorage Logic ---
        function loadData() {
            const localSchedules = localStorage.getItem('bali_local_schedules');
            const localChecklists = localStorage.getItem('bali_local_checklists');

            schedules = localSchedules ? JSON.parse(localSchedules) : [...defaultSchedules];
            checklists = localChecklists ? JSON.parse(localChecklists) : [...defaultChecklists];
            
            // 최초 실행 시 로컬 스토리지 데이터 동기화 보장
            if (!localSchedules) saveSchedules();
            if (!localChecklists) saveChecklists();
        }

        // --- Save Data ---
        function saveSchedules() {
            localStorage.setItem('bali_local_schedules', JSON.stringify(schedules));
        }

        function saveChecklists() {
            localStorage.setItem('bali_local_checklists', JSON.stringify(checklists));
        }

        // --- UI Utils ---
        function getDayOfWeek(dateString) {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const d = new Date(dateString);
            return isNaN(d) ? '' : days[d.getDay()];
        }

        function getRelativeDay(dateString) {
            const isBeforeStart = dateString.localeCompare('2026-07-25') === -1;
            if (isBeforeStart) {
                return '';
            }
            const start = new Date('2026-07-25');
            const current = new Date(dateString);
            const diffTime = Math.abs(current - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return `${diffDays}일차`;
        }

        function getTypeStyle(type) {
            switch(type) {
                case 'flight': return { bg: 'bg-sky-50 text-sky-600 border-sky-100', dot: 'bg-sky-500', name: '항공' };
                case 'transport': return { bg: 'bg-orange-50 text-orange-600 border-orange-100', dot: 'bg-orange-500', name: '이동' };
                case 'food': return { bg: 'bg-rose-50 text-rose-600 border-rose-100', dot: 'bg-rose-500', name: '식사' };
                case 'activity': return { bg: 'bg-indigo-50 text-indigo-600 border-indigo-100', dot: 'bg-indigo-500', name: '일정' };
                default: return { bg: 'bg-slate-50 text-slate-600 border-slate-100', dot: 'bg-slate-500', name: '기타' };
            }
        }

        // 특정 핵심 단어가 일정에 들어갈 때 지도 매핑 키 반환
        function getMapLocationKey(content) {
            const normalized = content.toLowerCase();
            if (normalized.includes('공항')) { return 'airport'; }
            if (normalized.includes('덴파사르')) { return 'airport'; }
            if (normalized.includes('스미냑')) { return 'seminyak'; }
            if (normalized.includes('포테이토')) { return 'seminyak'; }
            if (normalized.includes('더블식스')) { return 'seminyak'; }
            if (normalized.includes('워터봄')) { return 'kuta'; }
            if (normalized.includes('꾸따')) { return 'kuta'; }
            if (normalized.includes('우붓')) { return 'ubud'; }
            if (normalized.includes('누사테라피')) { return 'ubud'; }
            if (normalized.includes('몽키')) { return 'ubud'; }
            if (normalized.includes('바투르')) { return 'batur'; }
            if (normalized.includes('바투루')) { return 'batur'; }
            if (normalized.includes('지프')) { return 'batur'; }
            return null;
        }

        // --- Render UI Modules ---
        function renderSchedules() {
            schedules.sort((a, b) => {
                if (a.date !== b.date) {
                    return a.date.localeCompare(b.date);
                }
                const timeA = a.time || '23:59';
                const timeB = b.time || '23:59';
                return timeA.localeCompare(timeB);
            });

            document.getElementById('mobile-schedule-count').innerText = schedules.length;

            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            const groups = {};
            schedules.forEach(item => {
                if(!groups[item.date]) {
                    groups[item.date] = [];
                }
                groups[item.date].push(item);
            });

            const keys = Object.keys(groups);
            if (keys.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-slate-100">
                        <p class="text-slate-400 text-sm">등록된 일정이 없습니다. 일정을 작성해 보세요!</p>
                    </div>
                `;
                return;
            }

            keys.forEach(date => {
                const dateGroup = document.createElement('div');
                dateGroup.className = 'relative';

                const dayOfWeek = getDayOfWeek(date);
                const relativeDay = getRelativeDay(date);

                let headerHTML = `
                    <div class="sticky top-[138px] lg:top-[85px] z-20 bg-slate-50/95 backdrop-blur-md py-3 mb-3 border-b border-slate-200/50 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold text-white bg-teal-600 px-2.5 py-1 rounded-lg shadow-sm">${relativeDay}</span>
                            <h3 class="text-base font-extrabold text-slate-800">
                                ${date.split('-')[1]}월 ${date.split('-')[2]}일
                                <span class="text-xs font-semibold text-slate-400 ml-1.5">(${dayOfWeek}요일)</span>
                            </h3>
                        </div>
                    </div>
                `;

                let listHTML = `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-100">`;

                groups[date].forEach(item => {
                    const style = getTypeStyle(item.type);
                    const timeStr = item.time || '<span class="text-slate-300 font-normal">자유</span>';
                    
                    // 지도 매핑 여부 확인
                    const locKey = getMapLocationKey(item.content);
                    let mapBtnHTML = '';
                    if (locKey) {
                        mapBtnHTML = `
                            <button onclick="zoomToSpot('${locKey}')" class="no-print mt-2 inline-flex items-center gap-1 text-xs font-bold text-teal-700 bg-teal-50 hover:bg-teal-100 px-3 py-1.5 rounded-lg transition-all border border-teal-100">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-teal-600"></i> 🗺️ 지도 위치 보기
                            </button>
                        `;
                    }

                    listHTML += `
                        <div class="p-4 flex gap-4 group hover:bg-slate-50/70 transition-all relative">
                            <div class="w-14 shrink-0 text-right pt-0.5">
                                <span class="text-sm font-extrabold text-slate-700 block">${timeStr}</span>
                            </div>
                            <div class="relative flex flex-col items-center">
                                <div class="w-3 h-3 rounded-full ${style.dot} ring-4 ring-white z-10"></div>
                                <div class="w-0.5 bg-slate-100 absolute top-3 bottom-0 -z-0"></div>
                            </div>
                            <div class="flex-1 pb-1">
                                <div class="flex flex-wrap items-center gap-2 mb-1">
                                    <span class="text-[10px] font-extrabold px-1.5 py-0.5 rounded-md border ${style.bg}">${style.name}</span>
                                </div>
                                <p class="text-sm font-semibold text-slate-800 leading-relaxed pr-24">${item.content}</p>

                                ${mapBtnHTML}

                                <div class="absolute right-3 top-3 flex gap-1 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity bg-white p-1 rounded-lg border sm:border-0 sm:bg-transparent">
                                    <button class="no-print p-1.5 text-slate-400 hover:text-teal-600 hover:bg-teal-50 rounded-lg edit-schedule-btn" data-id="${item.id}">
                                        <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <button class="no-print p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg delete-schedule-btn" data-id="${item.id}">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                listHTML += `</div>`;
                dateGroup.innerHTML = headerHTML + listHTML;
                container.appendChild(dateGroup);
            });

            lucide.createIcons();

            // Bind Actions
            document.querySelectorAll('.edit-schedule-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const item = schedules.find(s => s.id === id);
                    if(item) {
                        openScheduleForm(item);
                    }
                };
            });

            document.querySelectorAll('.delete-schedule-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('이 일정을 삭제하시겠습니까?')) {
                        schedules = schedules.filter(s => s.id !== id);
                        saveSchedules();
                        renderSchedules();
                    }
                };
            });
        }

        function renderChecklist() {
            checklists.sort((a, b) => {
                if (a.isDone === b.isDone) {
                    return 0;
                }
                return a.isDone ? 1 : -1;
            });

            document.getElementById('mobile-checklist-count').innerText = checklists.length;

            const container = document.getElementById('checklist-container');
            container.innerHTML = '';

            const completedCount = checklists.filter(c => c.isDone).length;
            let progress = 0;
            if (checklists.length !== 0) {
                progress = Math.round((completedCount / checklists.length) * 100);
            }

            document.getElementById('progress-text').innerText = `${completedCount} / ${checklists.length}개 (${progress}%)`;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            if (checklists.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-slate-400 text-sm">준비물이 없습니다. 필요한 것을 등록해 보세요!</p>
                    </div>
                `;
                return;
            }

            checklists.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center p-3.5 gap-3 hover:bg-slate-50/50 transition-colors group relative';
                
                const checkBtnClass = item.isDone ? 'bg-teal-500 border-teal-500 text-white' : 'bg-white border-slate-300 text-transparent hover:border-teal-400';
                const contentClass = item.isDone ? 'text-slate-400 line-through font-normal' : 'text-slate-700 font-semibold';

                itemDiv.innerHTML = `
                    <button class="no-print w-6 h-6 rounded-lg border-2 flex items-center justify-center shrink-0 transition-all toggle-checklist-btn ${item.id}" data-id="${item.id}">
                        <i data-lucide="check" class="w-3.5 h-3.5 stroke-[3.5]"></i>
                    </button>
                    <span class="flex-1 text-sm transition-all break-keep ${contentClass}">${item.content}</span>
                    <button class="no-print text-slate-300 hover:text-rose-500 p-1.5 rounded-lg hover:bg-rose-50 transition-colors delete-checklist-btn lg:opacity-0 lg:group-hover:opacity-100" data-id="${item.id}">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                container.appendChild(itemDiv);
            });

            lucide.createIcons();

            // Bind Actions
            document.querySelectorAll('.toggle-checklist-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const item = checklists.find(c => c.id === id);
                    if(item) {
                        item.isDone = !item.isDone;
                        saveChecklists();
                        renderChecklist();
                    }
                };
            });

            document.querySelectorAll('.delete-checklist-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('이 준비물을 삭제하시겠습니까?')) {
                        checklists = checklists.filter(c => c.id !== id);
                        saveChecklists();
                        renderChecklist();
                    }
                };
            });
        }

        // --- Schedule Form Logic ---
        function openScheduleForm(item = null) {
            const form = document.getElementById('schedule-form');
            const addBtn = document.getElementById('add-schedule-btn');
            
            form.classList.remove('hidden');
            addBtn.classList.add('hidden');

            if (item) {
                document.getElementById('form-title').innerText = '📝 일정 편집하기';
                document.getElementById('form-schedule-id').value = item.id;
                document.getElementById('form-date').value = item.date;
                document.getElementById('form-time').value = item.time || '';
                document.getElementById('form-content').value = item.content;
                selectType(item.type);
            } else {
                document.getElementById('form-title').innerText = '➕ 새 일정 추가';
                document.getElementById('form-schedule-id').value = '';
                document.getElementById('form-date').value = '2026-07-25';
                document.getElementById('form-time').value = '';
                document.getElementById('form-content').value = '';
                selectType('activity');
            }
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function closeScheduleForm() {
            document.getElementById('schedule-form').classList.add('hidden');
            document.getElementById('add-schedule-btn').classList.remove('hidden');
        }

        // 카테고리 스타일 선택 적용
        function selectType(type) {
            currentSelectedType = type;
            const buttons = document.querySelectorAll('#type-selector button');
            buttons.forEach(btn => {
                const btnType = btn.getAttribute('data-type');
                if (btnType === type) {
                    btn.className = "py-2 text-xs rounded-xl border-2 font-bold transition-all bg-teal-500 border-teal-500 text-white shadow-sm";
                } else {
                    btn.className = "py-2 text-xs rounded-xl border-2 font-bold transition-all bg-white border-slate-100 text-slate-500 hover:bg-slate-50";
                }
            });
        }

        // --- 🗺️ Map Logic (Leaflet.js) ---
        const defaultCoordinates = {
            'airport': [-8.7481, 115.1672, '덴파사르 공항 ✈️'],
            'seminyak': [-8.6913, 115.1682, '스미냑 숙소/비치클럽 🏖️'],
            'kuta': [-8.7264, 115.1691, '워터봄 발리 🌊'],
            'ubud': [-8.5069, 115.2625, '우붓 힐링존 🐒'],
            'batur': [-8.2415, 115.3781, '바투르산 일출 지프 🌋']
        };

        function initMap() {
            map = L.map('map', { scrollWheelZoom: false }).setView([-8.55, 115.22], 10);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            updateMapMarkers();
        }

        function updateMapMarkers() {
            if (!map) return;
            
            map.eachLayer((layer) => {
                if (layer instanceof L.Marker) {
                    map.removeLayer(layer);
                }
            });

            markersGroup = {};
            const markers = [];

            Object.keys(defaultCoordinates).forEach(key => {
                const spot = defaultCoordinates[key];
                
                const labelIcon = L.divIcon({
                    className: 'custom-pin',
                    html: `📍 ${spot[2]}`,
                    iconSize: [140, 26]
                });

                const marker = L.marker([spot[0], spot[1]], { icon: labelIcon })
                    .addTo(map)
                    .bindPopup(`<div class="p-1"><strong class="text-teal-700">${spot[2]}</strong><br><span class="text-xs text-slate-500">일정표와 매핑된 거점 구역입니다.</span></div>`);
                
                markersGroup[key] = marker;
                markers.push(marker);
            });

            const len = markers.length;
            if (len !== 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.12));
            }
        }

        window.zoomToSpot = function(key) {
            const spot = defaultCoordinates[key];
            if (spot) {
                if (map) {
                    map.flyTo([spot[0], spot[1]], 14, {
                        animate: true,
                        duration: 1.5
                    });
                    
                    setTimeout(() => {
                        if (markersGroup[key]) {
                            markersGroup[key].openPopup();
                        }
                    }, 1500);

                    document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        };

        document.getElementById('schedule-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('form-schedule-id').value;
            const date = document.getElementById('form-date').value;
            const time = document.getElementById('form-time').value;
            const content = document.getElementById('form-content').value.trim();

            if (id) {
                const index = schedules.findIndex(s => s.id === id);
                if (index !== -1) {
                    schedules[index] = { id, date, time, content, type: currentSelectedType };
                }
            } else {
                const newId = 's_' + Date.now();
                schedules.push({ id: newId, date, time, content, type: currentSelectedType });
            }

            saveSchedules();
            renderSchedules();
            closeScheduleForm();
        };

        document.querySelectorAll('#type-selector button').forEach(btn => {
            btn.onclick = () => {
                selectType(btn.getAttribute('data-type'));
            };
        });

        document.getElementById('checklist-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('checklist-new-input');
            const content = input.value.trim();
            if(!content) {
                return;
            }

            const newId = 'c_' + Date.now();
            checklists.push({ id: newId, content, isDone: false });
            saveChecklists();
            renderChecklist();
            input.value = '';
        };

        // Form Visibility Toggles
        document.getElementById('add-schedule-btn').onclick = () => {
            openScheduleForm();
        };
        document.getElementById('close-form-btn').onclick = () => {
            closeScheduleForm();
        };
        document.getElementById('cancel-form-btn').onclick = () => {
            closeScheduleForm();
        };

        // Mobile Tabs Toggle
        const tabSchedule = document.getElementById('tab-schedule-btn');
        const tabChecklist = document.getElementById('tab-checklist-btn');
        const scheduleSection = document.getElementById('schedule-section');
        const checklistSection = document.getElementById('checklist-section');

        tabSchedule.onclick = () => {
            currentTab = 'schedule';
            tabSchedule.className = "flex-1 py-3.5 text-sm font-bold flex justify-center items-center gap-2 border-b-2 border-teal-600 text-teal-700 bg-teal-50/20";
            tabChecklist.className = "flex-1 py-3.5 text-sm font-bold flex justify-center items-center gap-2 text-slate-500 bg-white";
            scheduleSection.classList.remove('hidden');
            checklistSection.classList.add('hidden', 'lg:block');
        };

        tabChecklist.onclick = () => {
            currentTab = 'checklist';
            tabChecklist.className = "flex-1 py-3.5 text-sm font-bold flex justify-center items-center gap-2 border-b-2 border-teal-600 text-teal-700 bg-teal-50/20";
            tabSchedule.className = "flex-1 py-3.5 text-sm font-bold flex justify-center items-center gap-2 text-slate-500 bg-white";
            scheduleSection.classList.add('hidden');
            checklistSection.classList.remove('hidden');
        };

        // --- Start App ---
        window.onload = () => {
            loadData();
            renderSchedules();
            renderChecklist();
            initMap();
        };
    </script>
</body>
</html>
